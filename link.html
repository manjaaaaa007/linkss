<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMPEL GAMBAR JADI LINK</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #eee; padding: 15px; margin: 0; }
        h2 { text-align: center; color: #007bff; margin-bottom: 20px; }
        
        /* Grid sistem untuk banyak card */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            max-width: 95%;
            margin: 0 auto;
        }

        .card {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: border-color 0.2s;
        }

        .card:focus-within { border-color: #007bff; box-shadow: 0 0 8px rgba(0,123,255,0.3); }

        .preview {
            width: 100%;
            height: 100px;
            background: #2a2a2a;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 10px;
            color: #666;
            cursor: pointer;
            border: 1px dashed #444;
        }

        .preview img { width: 100%; height: 100%; object-fit: cover; }
        
        input {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            background: #000;
            border: 1px solid #333;
            color: #00ff00;
            border-radius: 4px;
            font-size: 10px;
            outline: none;
            text-align: center;
        }

        .btn-copy {
            background: #007bff;
            color: white;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }

        .btn-copy:active { background: #0056b3; transform: scale(0.98); }

        .slot-label {
            font-size: 10px;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>TEMPEL LANGSUNG AJA NANTI MUNCUL LINK DIBAWAH</h2>
    
    <div class="grid" id="container">
        <!-- 50 Cards generated by JavaScript -->
    </div>

<script>
    const API_KEY = 'd7095fa9b829691dca438585646a7ed2';
    const container = document.getElementById('container');
    const totalCards = 50; // <--- Ganti angka ini kalau mau lebih banyak lagi

    for (let i = 1; i <= totalCards; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="slot-label">SLOT ${i}</div>
            <div class="preview" tabindex="0">PASTE HERE</div>
            <input type="text" class="link-val" placeholder="..." readonly>
            <button class="btn-copy">COPY</button>
        `;
        container.appendChild(card);

        const previewArea = card.querySelector('.preview');
        const inputField = card.querySelector('.link-val');
        const copyBtn = card.querySelector('.btn-copy');

        // Logic Paste
        card.addEventListener('paste', async (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.type.indexOf("image") !== -1) {
                    const blob = item.getAsFile();
                    
                    // Show local preview fast
                    const reader = new FileReader();
                    reader.onload = (ev) => { 
                        previewArea.innerHTML = `<img src="${ev.target.result}">`;
                        previewArea.style.border = "none";
                    };
                    reader.readAsDataURL(blob);

                    // Start Uploading
                    inputField.value = "UPLOADING...";
                    const formData = new FormData();
                    formData.append('image', blob);

                    try {
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                            method: 'POST',
                            body: formData
                        });
                        const data = await res.json();
                        if (data.success) {
                            inputField.value = data.data.url;
                        }
                    } catch (err) {
                        inputField.value = "ERR!";
                    }
                }
            }
        });

        // Silent Copy Logic
        copyBtn.addEventListener('click', () => {
            const val = inputField.value;
            if (val && val !== "UPLOADING..." && val !== "ERR!") {
                inputField.select();
                navigator.clipboard.writeText(val);
            }
        });

        // Click input to auto-select
        inputField.addEventListener('click', () => inputField.select());
    }
</script>

</body>
</html>
